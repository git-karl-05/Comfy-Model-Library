<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >
    <title>LoRA Manager</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/app.js" defer></script>
</head>

<body>

<main class="app-container">

    <div class="content-container">

        <section class="top-toolbar">
            <button id="optionsButton" class="options-button" aria-label="Open options">
                ☰
            </button>

            <h1 class="toolbar-title">LoRA Library</h1>

            <div class="toolbar-right-actions">
                <button id="searchIconButton" class="search-icon-button" aria-label="Open search">
                    🔍
                </button>

                <button id="openActionMenuButton" class="toolbar-action-button" type="button" aria-label="Open LoRA actions">
                    ⋮
                </button>
            </div>

            <div id="searchOverlay" class="search-overlay hidden">
                <input
                        type="text"
                        id="searchInput"
                        placeholder="Search LoRAs..."
                        class="search-input"
                >

                <button id="closeSearchButton" class="search-close-button" aria-label="Close search">
                    ×
                </button>
            </div>
        </section>

        <nav id="sideMenu" class="side-menu hidden" aria-label="Main menu">
            <div class="side-menu-header">
                <h2>Menu</h2>

                <button id="closeMenuButton" class="menu-close-button" aria-label="Close menu">
                    ×
                </button>
            </div>

            <a href="/html/index.html" class="side-menu-link active">
                LoRA Library
            </a>

            <a href="/html/add-lora.html" class="side-menu-link">
                Add LoRA
            </a>

            <a href="/html/character-gallery.html" class="side-menu-link">
                Character Gallery
            </a>
        </nav>

        <div id="menuBackdrop" class="menu-backdrop hidden"></div>

        <section class="gallery-controls">

            <div class="category-filter-wrapper">

                <span class="category-filter-label">
                    Category
                </span>

                <select id="categoryFilter" class="category-filter">
                    <option value="ALL">All</option>
                    <option value="FAVORITES">Favorites</option>
                    <option value="BACKGROUND">Background</option>
                    <option value="CHARACTER">Character</option>
                    <option value="CONCEPT">Concept</option>
                    <option value="ENHANCER">Enhancer</option>
                    <option value="OUTFIT">Outfit</option>
                    <option value="POSES">Poses</option>
                    <option value="SLIDER">Slider</option>
                    <option value="STYLE">Style</option>
                </select>

            </div>

            <div class="layout-icon-controls">
                <button
                        id="singleColumnButton"
                        class="layout-icon-button active"
                        aria-label="Single column view">
                    ☰
                </button>

                <button
                        id="doubleColumnButton"
                        class="layout-icon-button"
                        aria-label="Double column view">
                    ▦
                </button>
            </div>

        </section>

        <section id="loraList" class="lora-list single-column">
            <!-- LoRA cards will be loaded here by JavaScript -->
        </section>

    </div>

    <div id="actionMenuOverlay" class="action-menu-overlay hidden">

        <section
                id="actionMenuPopover"
                class="action-menu-popover"
                role="dialog"
                aria-label="LoRA actions">

            <button
                    id="addLoraActionButton"
                    class="compact-action-button"
                    type="button">

            <span class="compact-action-icon" aria-hidden="true">
                ＋
            </span>

                <span>Add LoRA</span>

            </button>

            <button
                    id="showImportFolderButton"
                    class="compact-action-button"
                    type="button">

            <span class="compact-action-icon folder-icon" aria-hidden="true">
                📁
            </span>

                <span>Import LoRA</span>

            </button>

            <form id="importFolderForm" class="import-folder-form hidden">

                <label for="importFolderPath">
                    LoRA folder path
                </label>

                <input
                        type="text"
                        id="importFolderPath"
                        placeholder="C:/Users/.../ComfyUI/models/loras"
                        required
                >

                <button
                        id="importFolderSubmitButton"
                        class="submit-button"
                        type="submit">
                    Scan and Import
                </button>

            </form>

            <div
                    id="importResult"
                    class="import-result hidden"
                    aria-live="polite">
            </div>

        </section>

    </div>

    <button
            id="goTopButton"
            class="go-top-button hidden"
            type="button"
            aria-label="Go to top"
            title="Go to top">
        ↑
    </button>

</main>

<div id="loraDetailsModal" class="modal-overlay hidden">

    <section class="lora-details-sheet">

        <!-- Everything in this container scrolls -->
        <div class="lora-details-scroll-area">

            <div class="sheet-header">

                <!-- View-mode header -->
                <div id="detailsHeaderView" class="details-header-view">

                    <div class="details-title-container">
                        <h2 id="detailsLoraName">LoRA Name</h2>

                        <p id="detailsCreator" class="details-subtitle">
                            by Creator
                        </p>
                    </div>

                    <div class="details-actions">
                        <button
                                id="editLoraButton"
                                class="icon-button"
                                type="button"
                                aria-label="Edit LoRA"
                                title="Edit LoRA">
                            ✏
                        </button>

                        <button
                                id="closeLoraDetailsButton"
                                class="close-button"
                                type="button"
                                aria-label="Close LoRA details">
                            ×
                        </button>
                    </div>

                </div>

                <!-- Edit-mode header -->
                <div id="detailsHeaderEdit" class="details-header-edit hidden">
                    <h2>Edit LoRA Details</h2>
                </div>

            </div>

            <!-- Image remains read-only -->
            <div id="detailsImageContainer" class="details-image-container">
                <div class="lora-card-placeholder">
                    No Image
                </div>
            </div>

            <!-- View-mode details -->
            <section id="detailsInfoView" class="details-info">

                <p>
                    <strong>Version:</strong>
                    <span id="detailsVersion">N/A</span>
                </p>

                <p>
                    <strong>Category:</strong>
                    <span id="detailsCategory">N/A</span>
                </p>

                <p>
                    <strong>Subcategory:</strong>
                    <span id="detailsSubCategory">N/A</span>
                </p>

                <p>
                    <strong>Group:</strong>
                    <span id="detailsGroupName">N/A</span>
                </p>

                <p>
                    <strong>Seed:</strong>
                    <span id="detailsSeedNumber">N/A</span>
                </p>

            </section>

            <!-- Edit-mode details -->
            <section id="detailsInfoEdit" class="details-edit-grid hidden">

                <label class="details-edit-full-width">
                    LoRA Name

                    <input
                            type="text"
                            id="editLoraName"
                            class="details-edit-input"
                            required
                    >
                </label>

                <label class="details-edit-full-width">
                    Creator

                    <input
                            type="text"
                            id="editCreator"
                            class="details-edit-input"
                    >
                </label>

                <label>
                    Version

                    <input
                            type="text"
                            id="editVersion"
                            class="details-edit-input"
                    >
                </label>

                <label>
                    Category

                    <select
                            id="editCategory"
                            class="details-edit-input"
                            required>

                        <option value="">Select category</option>
                        <option value="BACKGROUND">Background</option>
                        <option value="CHARACTER">Character</option>
                        <option value="CONCEPT">Concept</option>
                        <option value="ENHANCER">Enhancer</option>
                        <option value="OUTFIT">Outfit</option>
                        <option value="POSES">Poses</option>
                        <option value="SLIDER">Slider</option>
                        <option value="STYLE">Style</option>

                    </select>
                </label>

                <label>
                    Subcategory

                    <input
                            type="text"
                            id="editSubCategory"
                            class="details-edit-input"
                    >
                </label>

                <label>
                    Group

                    <input
                            type="text"
                            id="editGroupName"
                            class="details-edit-input"
                    >
                </label>

                <label>
                    Seed

                    <input
                            type="number"
                            id="editSeedNumber"
                            class="details-edit-input"
                    >
                </label>

            </section>

            <!-- Positive prompt -->
            <div class="details-field">

                <div class="details-field-header">
                    <span class="details-field-label">Positive Prompt</span>

                    <button
                            type="button"
                            class="copy-field-button"
                            data-copy-target="detailsPositivePrompt"
                            aria-label="Copy positive prompt"
                            title="Copy positive prompt"
                    >
                        Copy
                    </button>
                </div>

                <div
                        id="detailsPositivePrompt"
                        class="details-field-value details-long-text"
                ></div>

            </div>

            <div class="details-field">

                <div class="details-field-header">
                    <span class="details-field-label">Seed Number</span>

                    <button
                            type="button"
                            class="copy-field-button"
                            data-copy-target="detailsSeedNumber"
                            aria-label="Copy seed number"
                            title="Copy seed number"
                    >
                        Copy
                    </button>
                </div>


                <!-- Folded additional details -->
                <details class="details-collapsible">

                    <summary class="details-collapsible-summary">
                        <span class="details-collapsible-icon" aria-hidden="true"></span>
                        <span>Additional details</span>
                    </summary>

                    <div class="details-collapsible-content">

                        <!-- Negative Prompt -->
                        <div class="details-field">

                            <div class="details-field-header">
                <span class="details-field-label">
                    Negative Prompt
                </span>

                                <button
                                        type="button"
                                        class="copy-field-button"
                                        data-copy-target="detailsNegativePrompt"
                                        aria-label="Copy negative prompt"
                                        title="Copy negative prompt"
                                >
                                    Copy
                                </button>
                            </div>

                            <div
                                    id="detailsNegativePrompt"
                                    class="details-field-value details-long-text"
                            ></div>

                        </div>

                        <!-- Notes -->
                        <div class="details-field">

                            <div class="details-field-header">
                                <span class="details-field-label">Notes</span>

                                <button
                                        type="button"
                                        class="copy-field-button"
                                        data-copy-target="detailsNotes"
                                        aria-label="Copy notes"
                                        title="Copy notes"
                                >
                                    Copy
                                </button>
                            </div>

                            <div
                                    id="detailsNotes"
                                    class="details-field-value details-long-text"
                            ></div>

                        </div>

                    </div>

                </details>
            <p
                    id="detailsEditMessage"
                    class="details-edit-message hidden"
                    aria-live="polite">
            </p>

        </div>

        <div
                id="detailsEditActionBar"
                class="shared-form-action-bar edit-form-action-bar hidden">

            <button
                    id="cancelLoraEditButton"
                    class="details-cancel-button"
                    type="button">
                Cancel
            </button>

            <button
                    id="saveLoraEditButton"
                    class="details-save-button"
                    type="button">
                Save
            </button>

        </div>

    </section>

</div>
</body>
</html>
