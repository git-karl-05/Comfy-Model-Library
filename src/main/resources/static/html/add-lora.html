<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add LoRA</title>

    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/add-lora.js" defer></script>
</head>

<body>

<main class="app-container">

    <div class="content-container">

        <section class="top-toolbar">

            <button
                    type="button"
                    id="backButton"
                    class="options-button"
                    aria-label="Go Back">
                ←
            </button>

            <h1 class="toolbar-title">Add LoRA</h1>

            <button
                    type="button"
                    id="closeAddLoraButton"
                    class="top-add-button"
                    aria-label="Cancel">
                ×
            </button>

        </section>

        <section class="form-page-intro">
            <p>Add a pose, style, character, prompt asset, or model reference.</p>
        </section>

        <form id="addLoraForm" class="lora-form form-card">

            <label>
                LoRA Name
                <input type="text" id="loraName" required>
            </label>

            <label>
                Version
                <input type="text" id="version">
            </label>

            <label>
                Creator
                <input type="text" id="creator">
            </label>

            <label>
                URL
                <input type="url" id="url">
            </label>
            <label>
                Preview Image
                <input type="file" id="previewImage" name = "previewImage" accept="image/*">
            </label>

            <label>
                Category
                <select id="category" required>
                    <option value="">Loading categories...</option>
                </select>
            </label>

            <label>
                Subcategory
                <input type="text" id="subCategory">
            </label>

            <label>
                Group Name
                <input type="text" id="groupName">
            </label>

            <label>
                Positive Prompt
                <textarea id="positivePrompt" rows="5"></textarea>
            </label>

            <label>
                Negative Prompt
                <textarea id="negativePrompt" rows="5"></textarea>
            </label>

            <label>
                Seed Number
                <input type="number" id="seedNumber">
            </label>

            <label>
                Notes
                <textarea id="notes" rows="5"></textarea>
            </label>

            <button type="submit" class="submit-button">
                Save LoRA
            </button>

        </form>

    </div>

</main>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const backButton = document.getElementById("backButton");
        const closeButton = document.getElementById("closeAddLoraButton");

        if (backButton) {
            backButton.addEventListener("click", () => {
                history.back();
            });
        }

        if (closeButton) {
            closeButton.addEventListener("click", () => {
                window.location.href = "/html/index.html";
            });
        }

    });
</script>

</body>
</html>
